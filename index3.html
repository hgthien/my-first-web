<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Tạo tài khoản mới</title>

    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <marquee>Xin chào đến với Web của Hgthien</marquee>
    <form id="registerForm">
        <div align="center">
            <h2>Vui Lòng Nhập Thông Tin </h2>
        </div>
        <fieldset>
            <div align="left">
                <font>Họ và Tên:</font><br />
                <input type="text" id="hoten" required /><br />

                <font>Mã số sinh viên</font><br />
                <input type="text" id="mssv" required/><br />

                <font>Giới Tính </font><br />
                <input type="radio" name="gioitinh" value="Nam" checked /><font>Nam</font>
                <input type="radio" name="gioitinh" value="Nu" /><font>Nữ</font><br />

                <font>Ngày Sinh</font><br />
                <input type="date" id="ngaysinh" required/><br />

                <font>Email</font><br />
                <input type="email" id="email" name="email_khach" placeholder="example@st.tvu.edu.vn" required/><br />

                <font>Mật khẩu</font><br />
                <input type="password" id="matkhau" required/><br />
                <font>Vui lòng nhập lại mật khẩu</font><br />
                <input type="password" id="matkhau1" required/><br />

                <br />
                <div align="center">
                    <button type="submit" onclick="saveData(event)">Lưu thông tin  </button>
                </div>
            </div>
        </fieldset>
        <script>
            function saveData(event) {

                const form = document.getElementById('registerForm');
                if (!form.checkValidity()) {
                    return; 
                }

                event.preventDefault();
                let name = document.getElementById("hoten").value;
                let studentID = document.getElementById("mssv").value;
                let ngaysinh = document.getElementById("ngaysinh").value;
                let email = document.getElementById("email").value;
                let matkhau = document.getElementById("matkhau").value;
                let matkhau1 = document.getElementById("matkhau1").value;

                if (matkhau !== matkhau1) {
                    alert("Mật khẩu nhập lại không khớp, vui lòng nhập lại!");
                    return;
                }

                localStorage.setItem("hoten", name);
                localStorage.setItem("mssv", studentID);
                localStorage.setItem("ngaysinh", ngaysinh);
                localStorage.setItem("email", email);
                localStorage.setItem("matkhau", matkhau);
                localStorage.setItem("matkhau1", matkhau1);
                alert("Đã đăng ký thành công tài khoản: " + name);
                window.location.href = "index.html";
            }
        </script>
        <br />
    </form>
</body>
</html>
