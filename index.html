<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>trang chính</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            color: #333;
            font-family: 'Segoe UI','Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header-container {
            background-color: white;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            max-width: 800px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
            border-radius: 10px;
            justify-content: space-between;
        }

        .table-container {
            background-color: white;
            border: 1px solid #ccc;
            max-width: 800px;
            padding: 10px 20px;
            margin: 0 auto 20px 0;
            border-radius: 10px;
        }

            .table-container th {
                padding-right: 15px;
                text-align: left;
            }

        .search-full-width {
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            max-width: 600px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
        }

            .search-full-width input {
                flex: 1;
                border: none;
                outline: none;
                padding: 10px;
                font-size: 16px;
            }

        .hidden {
            display: none;
        }

        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #008b8b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: 1px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

            button:hover {
                background-color: #e4e6eb;
                border-radius: 5px;
            }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        .input-login {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fafafa;
        }

            .input-login:focus {
                border-color: #00ced1;
                outline: none;
            }

        .reg-label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #555;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-bottom: 10px;
        }

        .gender-container {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin: 5px 0 15px 0;
        }

        .gender-item {
            margin-right: 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

            .gender-item input {
                margin-right: 8px;
                width: auto;
            }

        .gender-container input {
            margin-right: 5px;
            cursor: pointer;
        }

        .gender-container label {
            margin-right: 20px;
            cursor: pointer;
        }
        .book-card {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

            .book-card:hover {
                transform: translateY(-5px);
            }

            .book-card img {
                width: 140px;
                height: 200px;
                object-fit: cover;
                border-radius: 5px;
                margin-bottom: 10px;
            }

        .book-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="home-page" class="content-box">
        <header>
            <div align="right">
                <button onclick="showPage('account-page')">
                    <i class="fa-solid fa-user"></i>
                </button>
            </div>
            <div align="center">
                <h1><i class="fa-solid fa-book"></i>3ATBook</h1>
            </div>
            <h3 align="center">Chào mừng bạn đến với tiệm sách!</h3>
            <div>
                <div class="header-container">
                    <i class="fa-solid fa-house-chimney"></i>
                    <div style="display:flex;">

                        <button onclick="showPage('search-page')">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                        <button onclick="showPage('cart-page')">
                            <i class="fa-solid fa-cart-shopping"></i>
                        </button>
                    </div>
                </div>
            </div>
            <hr />
            <div>
                <table style="width:auto;">
                    <tr>
                        <th><button onclick="showPage('home-page')">Trang chủ</button></th>
                        <th><button a href="#sachmoi">Sách mới</button></th>
                        <th><button a href="#theloai">Thể loại</button></th>
                        <th><button>Bán chạy</button></th>
                        <th><button>Khuyến mãi</button></th>
                        <th><button>Tin tức</button></th>
                        <th><button>Liên hệ</button></th>
                    </tr>
                </table>
            </div>
        </header>
        <div>
            <h3>sách mới được thêm vào gần đây</h3>
            <a href="#sachmoi"></a>
            <table class="table-container">
                <tr>
                    <th>
                        <div class="book-card">
                            <img src="https://marketplace.canva.com/EAD5DLrZ1DE/1/0/1024w/canva-xanh-m%C3%B2ng-k%C3%A9t-v%C3%A0-h%E1%BB%93ng-b%C3%A1nh-donut-th%E1%BB%A9c-%C4%83n-nh%E1%BA%ADt-k%C3%BD-s%C3%A1ch-b%C3%ACa-Zlr77mT-27w.jpg" />
                            <div class="book-title">Nhập ký thức ăn</div>
                        </div>
                    </th>
                    <th>
                        <div class="book-card">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvs-dmZnbL-2wgx3MMJYeISinumkrLC2JAVg&s" />
                            <div class="book-title">Harry Potter và Bảo Bối Tử Thần</div>
                        </div>
                    </th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                </tr>
            </table>
        </div>
    </div>

    <div id="account-page" class="content-box hidden login">
        <div class="login-container">
            <div id="login-section">
                <form>
                    <h2 align="center" style="margin-top: 0; color: #333;">Đăng nhập/Đăng ký</h2>
                    <fieldset style="background: white; border: none; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                        <label style="font-weight: bold;">Email</label><br />
                        <input type="email" id="user-email" class="input-login" placeholder="example@email.com" required /><br />
                        <label style="font-weight: bold;">Mật khẩu</label><br />
                        <input type="password" id="user-matkhau" class="input-login" required /><br />
                        <br />
                        <label><i>bạn chưa có tài khoản!</i></label><br />
                        <a href="javascript:void(0)" onclick="toggleAuth('register')" style="color: #008b8b; text-decoration: none; font-size: 14px; ">tạo tài khoản?</a>
                        <br />
                        <br />
                        <div align="center">
                            <button type="submit" class="btn-nav" style="width: 100%; background-color: #008b8b; color: white; padding: 10px; border-radius: 5px; " onclick="Login(event)">ĐĂNG NHẬP  </button>
                        </div>
                    </fieldset>
                </form>
            </div>
            <form id="register-section" class="hidden">
                <div align="center">
                    <h2>Vui Lòng Nhập Thông Tin </h2>
                </div>
                <div class="login login-container">
                    <fieldset style="background: white; border: none; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                        <div align="left">
                            <label class="reg-label">Họ và Tên:</label><br />
                            <input type="text" id="hoten" class="input-login" required /><br />

                            <label class="reg-label">Mã số sinh viên</label><br />
                            <input type="text" id="mssv" class="input-login" required /><br />

                            <label class="reg-label">Giới Tính </label><br />
                            <div class="gender-container">
                                <div class="gender-item">
                                    <input type="radio" name="gioitinh" value="Nam" checked /><label for="nam">Nam</label><br />
                                    <input type="radio" name="gioitinh" value="Nu" /><label for="nu">Nữ</label><br />
                                </div>
                            </div>
                            <label class="reg-label">Ngày Sinh</label><br />
                            <input type="date" id="ngaysinh" required /><br />

                            <label class="reg-label">Email</label><br />
                            <input type="email" id="email" name="email_khach" class="input-login" placeholder="example@email.com" required /><br />

                            <label class="reg-label">Mật khẩu</label><br />
                            <input type="password" id="matkhau" class="input-login" required /><br />
                            <label class="reg-label">Vui lòng nhập lại mật khẩu</label><br />
                            <input type="password" id="matkhau1" class="input-login" required /><br />

                            <br />
                            <div align="center">
                                <button type="submit" class="btn-nav" style="width: 100%; background-color: #008b8b; color: white; padding: 12px; border-radius: 8px;" onclick="Register(event)">Lưu thông tin  </button>
                            </div>
                        </div>
                    </fieldset>
                </div>
            </form>
            <div id="profile-section" class="hidden">
                <div align="center">
                    <h2 style="color: #008b8b;"><i class="fa-solid fa-id-card"></i>Hồ Sơ Cá Nhân</h2>
                    <fieldset style="background: white; border: none; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; text-align: left;">
                        <p><strong>Họ Tên:</strong><span id="prof-hoten"></span></p>
                        <p><strong>MSSV:</strong><span id="prof-mssv"></span></p>
                        <p><strong>Ngày sinh:</strong><span id="prof-ngaysinh"></span></p>
                        <p><strong>Email:</strong><span id="prof-email"></span></p>
                        <br />
                        <button onclick="Logout()" style="width: 100%; background-color: #008b8b; color: white;">ĐĂNG XUẤT</button>
                    </fieldset>
                </div>
            </div>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="search-page" class="content-box hidden">
        <div class="search-full-width">
            <input type="text" id="searchInput" placeholder="Nhập tên sách em guộc ơi..." style="padding: 10px; width: 80%;" />
            <button onclick="performSearch()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="cart-page" class="content-box hidden">
        <div align="center" style="margin-top: 50px;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <p>Lựa cuốn sách mà em guộc thích nhé <i class="fa-solid fa-face-smile-beam"></i></p>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <script>
        let isLoggedIn = false;

        function showPage(pageId) {
            let allPages = document.querySelectorAll('.content-box');
            allPages.forEach(page => { page.classList.add('hidden'); });
            document.getElementById(pageId).classList.remove('hidden');
            if (pageId === 'account-page') {
                if (isLoggedIn) {
                    // Nếu đã đăng nhập: Hiện hồ sơ, ẩn login và register
                    document.getElementById('profile-section').classList.remove('hidden');
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('register-section').classList.add('hidden');
                } else {
                    // Nếu chưa đăng nhập: Hiện form login
                    toggleAuth('login');
                    document.getElementById('profile-section').classList.add('hidden');
                }
            }
        }
        function performSearch() {
            let val = document.getElementById('searchInput').value;
            if (val) {
                alert("Đang tìm sách: " + val);
            } else {
                alert("Chưa nhập gì mà em guộc!");
            }
        }
        // chuyển đổi trang đăng nhập và đăng ký
        function toggleAuth(type) {
            if (type === 'register') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.remove('hidden');
            } else {
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');

            }
        }
        //đăng nhập
        function Login(event) {
            if (!event.target.form.checkValidity()) {
                return;
            }
            event.preventDefault();
            // Lấy giá trị user nhập vào ô input
            let emailDangnhap = document.getElementById("user-email").value;
            let matkhauDangnhap = document.getElementById("user-matkhau").value;
            // Lấy giá trị ĐÃ LƯU lúc đăng ký (Key phải khớp với hàm Registr bên dưới)
            let emailDaluu = localStorage.getItem("email");
            let matkhauDaluu = localStorage.getItem("matkhau");
            if (emailDangnhap === emailDaluu && matkhauDangnhap === matkhauDaluu) {
                alert("Đăng nhập thành công!");
                isLoggedIn = true;
                // 1. Lấy dữ liệu từ máy lên để hiển thị vào hồ sơ
                document.getElementById("prof-hoten").innerText = localStorage.getItem("hoten");
                document.getElementById("prof-mssv").innerText = localStorage.getItem("mssv");
                document.getElementById("prof-ngaysinh").innerText = localStorage.getItem("ngaysinh");
                document.getElementById("prof-email").innerText = localStorage.getItem("email");

                // 2. Ẩn form đăng nhập và hiện hồ sơ
                document.getElementById("login-section").classList.add("hidden");
                document.getElementById("profile-section").classList.remove("hidden");
                showPage('account-page');

            }
            else {
                alert("Email hoặc mật khẩu không chính xác.Vui lòng nhập lại!");
            }
        }
        //đăng ký
        function Register(event) {
            const form = document.getElementById('register-section');
            if (!form.checkValidity()) {
                return;
            }
            event.preventDefault();
            let name = document.getElementById("hoten").value;
            let studentID = document.getElementById("mssv").value;
            let ngaysinh = document.getElementById("ngaysinh").value;
            let email = document.getElementById("email").value;
            let matkhau = document.getElementById("matkhau").value;
            let matkhau1 = document.getElementById("matkhau1").value;
            if (matkhau !== matkhau1) {
                alert("Mật khẩu nhập lại không khớp, vui lòng nhập lại!");
                return;
            }
            localStorage.setItem("hoten", name);
            localStorage.setItem("mssv", studentID);
            localStorage.setItem("ngaysinh", ngaysinh);
            localStorage.setItem("email", email);
            localStorage.setItem("matkhau", matkhau);
            localStorage.setItem("matkhau1", matkhau1);
            alert("Đã đăng ký thành công tài khoản: " + name);
            toggleAuth('login');
        }
        //Đăng xuất
        function Logout() {
            isLoggedIn = false; // Đánh dấu đã thoát
            toggleAuth('login'); // Quay về form đăng nhập
            showPage('account-page'); // Refresh lại trang account
        }
    </script>
</body>
</html>
