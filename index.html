<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>trang chính</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            color: #333;
            font-family: 'Segoe UI','Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-container{
            background-color: white;
            border: 1px solid #ccc;
            display:flex;
            align-items:center;
            max-width: 800px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
            border-radius:10px;
            justify-content: space-between;
        }
        .search-full-width {
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            max-width: 600px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
        }
        .search-full-width input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 16px;
        }
        .hidden{
            display:none;
        }
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #008b8b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: 1px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:hover{
            background-color: #e4e6eb;
            border-radius: 5px;
        }
        .login-container {                  
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .input-login{
            width: 100%;
            padding:12px;
            margin: 8px 0 15px 0;
            border: 1px
            solid #ddd;
            border-radius: 8px;
            box-sizing:border-box;
            background-color: #fafafa;
        }
        .input-login:focus{
            border-color: #00ced1;
            outline: none;
        }
    </style>
</head>
<body>
    <div align="center" id="home-page" class="content-box">
        <div align="right">
            <button onclick="showPage('account-page')">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <h1>SÁCH TỐT GIÁ RẺ 3 ANH TÀI</h1>
        <h3 align="center">Chào mừng bạn đến với tiệm sách!</h3>
    </div>
    <div id="home-page" class="content-box">
        <div class="header-container">
                <i class="fa-solid fa-house-chimney"></i>
            <div style="display:flex;">
               
                <button onclick="showPage('search-page')">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button onclick="showPage('cart-page')">
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="account-page" class="content-box hidden login">
        <div class="login-container">
            <form>
                <h2 align="center" style="margin-top: 0; color: #333;">Đăng nhập/Đăng ký</h2>
                <fieldset style="background: white; border: none; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">                  
                    <label style="font-weight: bold;">Email</label><br />
                    <input type="email" id="email" class="input-login" placeholder="example@email.com" required /><br />
                    <label style="font-weight: bold;">Mật khẩu</label><br />
                    <input type="password" id="matkhau" class="input-login" required /><br />
                    <br />
                    <label><i>bạn chưa có tài khoản!</i></label><br />
                    <a href="test.html" target="_blank" style="color: #008b8b; text-decoration: none; font-size: 14px; ">tạo tài khoản?</a>
                    <br />
                    <br />
                    <div align="center">
                        <button type="submit" class="btn-nav" style="width: 100%; background-color: #008b8b; color: white; padding: 10px; border-radius: 5px; " onclick="saveData(event)">ĐĂNG NHẬP  </button>
                    </div>
                </fieldset>
            </form>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="search-page" class="content-box hidden">
        <div class="search-full-width">
            <input type="text" id="searchInput" placeholder="Nhập tên sách em guộc ơi..." style="padding: 10px; width: 80%;" />
            <button onclick="performSearch()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="cart-page" class="content-box hidden">
        <div align="center" style="margin-top: 50px;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <p>Lựa cuốn sách mà em guộc thích nhé <i class="fa-solid fa-face-smile-beam"></i></p>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <script>
        function showPage(pageId) {
            let allPages = document.querySelectorAll('.content-box');
            allPages.forEach(page => {
                page.classList.add('hidden');
            });

            document.getElementById(pageId).classList.remove('hidden');
        }
        function performSearch() {
            let val = document.getElementById('searchInput').value;
            if (val) {
                alert("Đang tìm sách: " + val);
            } else {
                alert("Chưa nhập gì mà em guộc!");
            }
        }
         function saveData(event) {
     if (!event.target.form.checkValidity()) {
         return;
     }
     event.preventDefault();
     let emailDangnhap = document.getElementById("email").value;
     let matkhauDangnhap = document.getElementById("matkhau").value;

     let emailDaluu = localStorage.getItem("email");
     let matkhauDaluu = localStorage.getItem("matkhau");
     if (emailDangnhap === emailDaluu && matkhauDangnhap === matkhauDaluu) {
         alert("Đăng nhập thành công!");
         showPage('home-page');

     }
     else {
         alert("Email hoặc mật khẩu không chính xác.Vui lòng nhập lại!");
     }
 }
    </script>
</body>
</html>
