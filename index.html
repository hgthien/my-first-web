<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>trang chính</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            color: #333;
            font-family: 'Segoe UI','Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-container{
            background-color: white;
            border: 1px solid #ccc;
            display:flex;
            align-items:center;
            max-width: 800px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
            border-radius:10px;
            justify-content: space-between;
        }
        .table-container {
            background-color: white;
            border: 1px solid #ccc;
            max-width: 800px;
            padding: 10px 20px;
            margin: 0 auto 20px 0;
            border-radius: 10px;
        }
        .table-container th{
            padding-right: 15px;
            text-align: left;
        }
        .search-full-width {
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            max-width: 600px;
            padding: 10px 20px;
            margin: 0 auto 20px auto;
        }
        .search-full-width input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 16px;
        }
        .hidden{
            display:none;
        }
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #008b8b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: 1px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:hover{
            background-color: #e4e6eb;
            border-radius: 5px;
        }
        .login-container {                  
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .input-login{
            width: 100%;
            padding:12px;
            margin: 8px 0 15px 0;
            border: 1px
            solid #ddd;
            border-radius: 8px;
            box-sizing:border-box;
            background-color: #fafafa;
        }
        .input-login:focus{
            border-color: #00ced1;
            outline: none;
        }
        .reg-label{
            font-weight:bold;
            display:block;
            margin-top: 10px;
            color:#555;
        }
        input[type="date"]{
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-bottom: 10px;
        }
        .gender-container{
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin: 5px 0 15px 0;
        }
        .gender-item {
            margin-right: 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .gender-item input {
            margin-right: 8px;
            width: auto;
        }
        .gender-container input{
            margin-right:5px;
            cursor: pointer;
        }
        .gender-container label{
            margin-right: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div align="center" id="home-page" class="content-box">
            <div align="right">
                <button onclick="showPage('account-page')">
                    <i class="fa-solid fa-user"></i>
                </button>
            </div>
            <h1><i class="fa-solid fa-book"></i>3AT Book</h1>
            <h3 align="center">Chào mừng bạn đến với tiệm sách!</h3>
            <div>
                <div class="header-container">
                    <i class="fa-solid fa-house-chimney"></i>
                    <div style="display:flex;">

                        <button onclick="showPage('search-page')">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                        <button onclick="showPage('cart-page')">
                            <i class="fa-solid fa-cart-shopping"></i>
                        </button>
                    </div>
                </div>
            </div>
            <hr />
        </div>
        <div class=".table-container">
            <table style="width:auto;">
                <tr>
                    <th><button onclick="showPage('home-page')">Trang chủ</button></th>
                    <th><button a href="#sachmoi">Sách mới</button></th>
                    <th><button a href="#theloai">Thể loại</button></th>
                    <th><button>Bán chạy</button></th>                   
                    <th><button>Khuyến mãi</button></th>
                    <th><button>Tin tức</button></th>
                    <th><button>Liên hệ</button></th>
                </tr>
            </table>
        </div>
    </header>
    <h3>sách mới được thêm vào gần đây</h3>
    <div a href="#sachmoi"></div>

    <div id="account-page" class="content-box hidden login">
        <div class="login-container">
            <div id="login-section">
                <form>
                    <h2 align="center" style="margin-top: 0; color: #333;">Đăng nhập/Đăng ký</h2>
                    <fieldset style="background: white; border: none; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                        <label style="font-weight: bold;">Email</label><br />
                        <input type="email" id="login-email" class="input-login" placeholder="example@email.com" required /><br />
                        <label style="font-weight: bold;">Mật khẩu</label><br />
                        <input type="password" id="login-matkhau" class="input-login" required /><br />
                        <br />
                        <label><i>bạn chưa có tài khoản!</i></label><br />
                        <a href="javascript:void(0)" onclick="toggleAuth('register')" style="color: #008b8b; text-decoration: none; font-size: 14px; ">tạo tài khoản?</a>
                        <br />
                        <br />
                        <div align="center">
                            <button type="submit" class="btn-nav" style="width: 100%; background-color: #008b8b; color: white; padding: 10px; border-radius: 5px; " onclick="saveData(event)">ĐĂNG NHẬP  </button>
                        </div>
                    </fieldset>
                </form>
            </div>
            <form id="register-section" class="hidden">
                <div align="center">
                    <h2>Vui Lòng Nhập Thông Tin </h2>
                </div>
                <div class="login login-container">
                    <fieldset style="background: white; border: none; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                        <div align="left">
                            <label class="reg-label">Họ và Tên:</label><br />
                            <input type="text" id="reg-hoten" class="input-login" required /><br />

                            <label class="reg-label">Mã số sinh viên</label><br />
                            <input type="text" id="reg-mssv" class="input-login" required /><br />

                            <label class="reg-label">Giới Tính </label><br />
                            <div class="gender-container">
                                <div class="gender-item">
                                    <input type="radio" name="gioitinh" value="Nam" checked /><label for="nam">Nam</label><br />
                                    <input type="radio" name="gioitinh" value="Nu" /><label for="nu">Nữ</label><br />
                                </div>
                            </div>
                            <label class="reg-label">Ngày Sinh</label><br />
                            <input type="date" id="reg-ngaysinh" required /><br />

                            <label class="reg-label">Email</label><br />
                            <input type="email" id="reg-email" name="email_khach" class="input-login" placeholder="example@email.com" required /><br />

                            <label class="reg-label">Mật khẩu</label><br />
                            <input type="password" id="reg-matkhau" class="input-login" required /><br />
                            <label class="reg-label">Vui lòng nhập lại mật khẩu</label><br />
                            <input type="password" id="reg-matkhau1" class="input-login" required /><br />

                            <br />
                            <div align="center">
                                <button type="submit" class="btn-nav" style="width: 100%; background-color: #008b8b; color: white; padding: 12px; border-radius: 8px;" onclick="Register(event)">Lưu thông tin  </button>
                            </div>
                        </div>
                    </fieldset>
                </div>
            </form>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="search-page" class="content-box hidden">
        <div class="search-full-width">
            <input type="text" id="searchInput" placeholder="Nhập tên sách em guộc ơi..." style="padding: 10px; width: 80%;" />
            <button onclick="performSearch()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <div id="cart-page" class="content-box hidden">
        <div align="center" style="margin-top: 50px;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <p>Lựa cuốn sách mà em guộc thích nhé <i class="fa-solid fa-face-smile-beam"></i></p>
        </div>
        <div class="back-button" onclick="showPage('home-page')">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
    </div>
    <script>
        function showPage(pageId) {
            let allPages = document.querySelectorAll('.content-box');
            allPages.forEach(page => { page.classList.add('hidden'); });
            document.getElementById(pageId).classList.remove('hidden');
        }
        function performSearch() {
            let val = document.getElementById('searchInput').value;
            if (val) {
                alert("Đang tìm sách: " + val);
            } else {
                alert("Chưa nhập gì mà em guộc!");
            }
        }
        // chuyển đổi trang đăng nhập và đăng ký
        function toggleAuth(type) {
            if (type === 'register') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.remove('hidden');
            } else {
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');

            }
        }
        //đăng nhập
        function Login(event) {
            if (!event.target.form.checkValidity()) {
                return;
            }
            event.preventDefault();
            let emailDangnhap = document.getElementById("login-email").value;
            let matkhauDangnhap = document.getElementById("login-matkhau").value;

            let emailDaluu = localStorage.getItem("email");
            let matkhauDaluu = localStorage.getItem("matkhau");
            if (emailDangnhap === emailDaluu && matkhauDangnhap === matkhauDaluu) {
                alert("Đăng nhập thành công!");
                showPage('home-page');

            }
            else {
                alert("Email hoặc mật khẩu không chính xác.Vui lòng nhập lại!");
            }
        }
        //đăng ký
        function Registr(event) {
            const form = document.getElementById('registerForm');
            if (!form.checkValidity()) {
                return;
            }
            event.preventDefault();
            let name = document.getElementById("reg-hoten").value;
            let studentID = document.getElementById("reg-mssv").value;
            let ngaysinh = document.getElementById("reg-ngaysinh").value;
            let email = document.getElementById("reg-email").value;
            let matkhau = document.getElementById("reg-matkhau").value;
            let matkhau1 = document.getElementById("reg-matkhau1").value;
            if (matkhau !== matkhau1) {
                alert("Mật khẩu nhập lại không khớp, vui lòng nhập lại!");
                return;
            }
            localStorage.setItem("hoten", name);
            localStorage.setItem("mssv", studentID);
            localStorage.setItem("ngaysinh", ngaysinh);
            localStorage.setItem("email", email);
            localStorage.setItem("matkhau", matkhau);
            localStorage.setItem("matkhau1", matkhau1);
            alert("Đã đăng ký thành công tài khoản: " + name);
            toggleAuth('login');
        }
    </script>
</body>
</html>
