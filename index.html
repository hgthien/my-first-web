<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>đăng nhập</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form>
        <fieldset>
            <h2>Đăng nhập</h2>

            <font>Email</font><br />
            <input type="email" id="email" name="email_khach" placeholder="example@st.tvu.edu.vn" required /><br />

            <font>Mật khẩu</font><br />
            <input type="password" id="matkhau" required /><br />
            <br />

            <a href="index3.html" target="_blank">tạo tài khoản?</a><br /><br />

            <div align="center">
                <button type="submit" onclick="saveData(event)">đăng nhập  </button>
            </div>
        </fieldset>
    </form>
    <script>
        function saveData(event) {
            if (!event.target.form.checkValidity()) {
                return;
            }
            event.preventDefault();
            let emailDangnhap = document.getElementById("email").value;
            let matkhauDangnhap = document.getElementById("matkhau").value;

            let emailDaluu = localStorage.getItem("email");
            let matkhauDaluu = localStorage.getItem("matkhau");

            if (emailDangnhap === emailDaluu && matkhauDangnhap === matkhauDaluu) {
                alert("Đăng nhập thành công!");
                window.location.href = "index2.html";

            }
            else {
                alert("Email hoặc mật khẩu không chính xác.Vui lòng nhập lại!");
            }
        }
    </script>
</body>
</html>
